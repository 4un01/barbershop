<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fadestore</title>
    <link rel="stylesheet" href="./home.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Bebas+Neue&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap');
    </style>
</head>
<body></body>
    
    <nav>
            <div class="logo">
                <h1>fadestore</h1>
            </div>

            <div class="pageLinks">
                <p>GALLERY</p>
                <p>ABOUT</p>
                <p>BOOK NOW</p>
                <p>MY BOOKINGS</p>
            </div>

            <div class="btnContainer">
                <button id="loginBtn">LOG IN</button>
            </div>
    </nav>

    <main>

        <div class="heroSection">
            <h1>TRANSFORM YOUR LOOK</h1>
            <h2>THE ULTIMATE MENS GROOMING EXPERIENCE</h2>
            <button id="bookBtn">BOOK NOW</button>
        </div>

        <div class="ourServices">
            <h1>OUR SERVICES</h1>
            <div class="haircuts">
                <div class="child">
                    <img src="./images/childTaperFade.png" alt="child getting a haircut">
                    <h2>CHILDRENS CUTS</h2>
                    <p>PRICE: £10</p>
                    <button class="haircutBookNow">BOOK NOW</button>
                </div>

                <div class="adult">
                    <img src="./images/cleanCutz.jpg" alt="man getting a haircut">
                    <h2>ADULT CUTS</h2>
                    <p>PRICE: £20</p>
                    <button class="haircutBookNow">BOOK NOW</button>
                </div>

                <div class="beardAndHair">
                    <img src="./images/beard trims.jpg" alt="Guy getting his beard done">
                    <h2>HAIR & BEARD</h2>
                    <p>PRICE: £25</p>
                    <button class="haircutBookNow">BOOK NOW</button>
                </div>
            </div>
        </div>

    </main>

    <footer></footer>

</body>
</html>
